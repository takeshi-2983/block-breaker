<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>block-breaker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="characterSelectModal" class="modal">
        <div class="modal-content character-select">
            <h2>キャラクターを選択</h2>
            <div class="character-grid">
                <div class="character-option" data-character="manta">
                    <div class="character-preview manta-preview"></div>
                    <p>ネオン・エイ</p>
                    <span class="character-desc">バランス型</span>
                </div>
                <div class="character-option" data-character="cat">
                    <div class="character-preview cat-preview"></div>
                    <p>クロネコ</p>
                    <span class="character-desc">スピード型</span>
                </div>
                <div class="character-option" data-character="gorilla">
                    <div class="character-preview gorilla-preview"></div>
                    <p>ゴリラ</p>
                    <span class="character-desc">パワー型</span>
                </div>
                <div class="character-option" data-character="monkey">
                    <div class="character-preview monkey-preview"></div>
                    <p>サル</p>
                    <span class="character-desc">テクニカル型</span>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <h1>block-breaker</h1>
        <div class="game-info">
            <div class="stage">Stage: <span id="stage">1</span>/5</div>
            <div class="score">スコア: <span id="score">0</span></div>
            <div class="lives">ライフ: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <button id="startBtn" class="btn">ゲーム開始</button>
            <button id="pauseBtn" class="btn" disabled>一時停止</button>
            <button id="resetBtn" class="btn">リセット</button>
        </div>
        <div class="movement-controls">
            <button id="leftBtn" class="movement-btn left-btn">◀ 左</button>
            <button id="rightBtn" class="movement-btn right-btn">右 ▶</button>
        </div>
        <div id="gameOver" class="modal hidden">
            <div class="modal-content">
                <h2 id="gameOverTitle">ゲームオーバー</h2>
                <p>最終スコア: <span id="finalScore">0</span></p>
                <button id="restartBtn" class="btn">もう一度プレイ</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
